<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — JS Fundamentals Demo</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <script src="../JS/main.js" defer></script>
</head>
<body>
  <!--
    Login-only entry: same form as index.html.
    On success, main.js sets sessionStorage and sends you to ../index.html
    (full dashboard + tasks live on the main page).
  -->
  <section id="login-section" class="login-section" aria-label="Login">
    <div class="login-card card">
      <h1 class="login-title">Sign in</h1>
      <p class="login-hint">You will be redirected to the To-Do Dashboard.</p>
      <form id="login-form" class="login-form" novalidate>
        <label class="field">
          <span class="field-label">Email</span>
          <input
            type="text"
            id="login-email"
            name="email"
            autocomplete="username"
            value="ahmed"
            required
          >
        </label>
        <label class="field">
          <span class="field-label">Password</span>
          <input
            type="password"
            id="login-password"
            name="password"
            autocomplete="current-password"
            value="12345"
            required
          >
        </label>
        <p id="login-error" class="form-error" role="alert" hidden></p>
        <button type="submit" class="btn btn-primary btn-block">Log in</button>
      </form>
      <p class="login-footer">
        <a href="../index.html" class="login-footer-link">Back to main app</a>
      </p>
    </div>
  </section>
</body>
</html>
